name: Docker Publish

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          is_release=false
          create_tag=false
          major_minor="0.0"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            current_tag="$(
              git tag --points-at HEAD \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -V \
                | tail -n 1 || true
            )"

            if [ -n "${current_tag}" ]; then
              tag="${current_tag}"
              version="${tag#v}"
            else
              latest_tag="$(
                git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
                  | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                  | sort -V \
                  | tail -n 1 || true
              )"
              latest_version="${latest_tag#v}"
              if [ -z "${latest_version}" ]; then
                latest_version="0.0.0"
              fi

              IFS=. read -r major minor patch <<< "${latest_version}"
              patch=$((patch + 1))
              version="${major}.${minor}.${patch}"
              tag="v${version}"
              create_tag=true
            fi

            IFS=. read -r major minor patch <<< "${version}"
            major_minor="${major}.${minor}"
            is_release=true
          else
            safe_ref="$(
              printf '%s' "${GITHUB_REF_NAME:-manual}" \
                | tr '[:upper:]/' '[:lower:]-' \
                | tr -cd 'a-z0-9_.-'
            )"
            if [ -z "${safe_ref}" ]; then
              safe_ref="manual"
            fi
            version="snapshot-${safe_ref}-${short_sha}"
            tag="${version}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major_minor}" >> "${GITHUB_OUTPUT}"
          echo "is_release=${is_release}" >> "${GITHUB_OUTPUT}"
          echo "create_tag=${create_tag}" >> "${GITHUB_OUTPUT}"

      - name: Prepare image name
        id: prep
        run: |
          IMAGE_NAME="$(echo "${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.version.outputs.tag }},enable=${{ steps.version.outputs.is_release }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.is_release }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.is_release }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release tag
        if: steps.version.outputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.version.outputs.create_tag == 'true' && github.ref_name == github.event.repository.default_branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          MAJOR_MINOR: ${{ steps.version.outputs.major_minor }}
        run: |
          notes="$(cat <<EOF
          Published container image:

          - \`${IMAGE}:${TAG}\`
          - \`${IMAGE}:${VERSION}\`
          - \`${IMAGE}:${MAJOR_MINOR}\`
          - \`${IMAGE}:latest\`
          EOF
          )"

          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --notes "${notes}" \
            --generate-notes \
            --verify-tag
