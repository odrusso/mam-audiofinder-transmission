services:
  mam-audiofinder:
    build: .
    image: ghcr.io/raygan/mam-audiofinder:latest
    container_name: mam-audiofinder
    ports:
      - "${APP_PORT}:8080"
    env_file:
      - .env
    user: "${PUID}:${PGID}"
    environment:
      UMASK: "${UMASK}"
    volumes:
      - ${DATA_DIR}:/data
      # Edit the host paths on the left. Keep the in-container paths static.
      - /path/to/transmission-downloads:/downloads
      - /path/to/audiobookshelf-library:/library
    restart: unless-stopped
