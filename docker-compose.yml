services:
  mam-audiofinder:
    # `up --build` uses the checked-out source; `pull` can use the published GHCR image.
    build: .
    container_name: mam-audiofinder
    ports:
      - "8080:8080"
    environment:
      MAM_COOKIE: ""
      TRANSMISSION_URL: "localhost:9091/transmission/rpc
      TRANSMISSION_USER: ""
      TRANSMISSION_PASS: ""
    volumes:
      - /path/to/appdata-for-db:/data
      - /path/to/transmission-downloads:/downloads
      - /path/to/audiobook-library:/library
      - /path/to/ebook-library:/ebooks
    restart: unless-stopped
